<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Form. Pediatria">
<meta name="theme-color" content="#0d1b2a">
<title>Formulário de Pediatria</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2a;--s1:#1a2d40;--s2:#1e3a52;--s3:#243d57;
  --ac:#4fc3f7;--ac2:#81d4fa;--red:#ef5350;--grn:#66bb6a;--ylw:#ffa726;
  --tx:#e8f4f8;--mu:#7fb3c8;--bd:#1e3650;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  overflow:hidden;-webkit-tap-highlight-color:transparent;font-size:15px}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}

/* HEADER */
#hd{background:linear-gradient(135deg,#0a2540,#1a3a5c);
  padding:calc(var(--st)+12px) 14px 12px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.5)}
.hd-row{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;background:var(--ac);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#0a2540;flex-shrink:0}
.hd-title{flex:1}
.hd-title h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hd-title p{font-size:11px;color:var(--ac);margin-top:1px}
.hd-actions{display:flex;gap:6px}
.hd-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:6px 10px;color:var(--tx);font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap}
.hd-btn:active{background:rgba(255,255,255,.15)}
.hd-btn.active{border-color:var(--ac);color:var(--ac)}

/* SEARCH */
.search-wrap{margin-top:10px;position:relative}
#si{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--bd);
  border-radius:12px;padding:10px 16px 10px 40px;color:var(--tx);
  font-size:16px;outline:none;-webkit-appearance:none}
#si:focus{border-color:var(--ac)}
#si::placeholder{color:var(--mu)}
.si-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--mu);font-size:16px;pointer-events:none}
.si-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--mu);font-size:18px;cursor:pointer;display:none;
  background:none;border:none;color:var(--mu)}

/* MAIN */
#main{flex:1;overflow:hidden;position:relative}

/* VIEWS */
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;flex-direction:column}
.view.active{display:flex}

/* HOME VIEW */
#v-home{padding:12px;gap:10px}
.section-title{font-size:11px;font-weight:700;color:var(--ac);
  text-transform:uppercase;letter-spacing:1px;margin:4px 0 6px;padding:0 2px}
.drug-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.drug-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:12px;cursor:pointer;transition:transform .1s,border-color .15s;
  position:relative;overflow:hidden}
.drug-card:active{transform:scale(.97);border-color:var(--ac)}
.drug-card h3{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:2px}
.drug-card .pg{font-size:10px;color:var(--mu);margin-top:4px}
.drug-card.urgent{border-left:3px solid var(--red)}
.drug-card.important{border-left:3px solid var(--ylw)}
.drug-card.normal{border-left:3px solid var(--bd)}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 5px;
  border-radius:4px;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.tag-red{background:rgba(239,83,80,.2);color:#ef9a9a}
.tag-ylw{background:rgba(255,167,38,.2);color:#ffcc80}
.tag-blue{background:rgba(79,195,247,.15);color:var(--ac)}

/* SEARCH RESULTS */
#v-search{padding:10px}
.sr-count{font-size:12px;color:var(--mu);margin-bottom:8px;padding:2px 4px}
.sr-item{background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer}
.sr-item:active{background:var(--s2);border-color:var(--ac)}
.sr-name{font-size:15px;font-weight:600;margin-bottom:4px}
.sr-excerpt{font-size:12px;color:var(--mu);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hl{color:var(--ac);font-weight:600}
#no-results{text-align:center;padding:50px 20px;color:var(--mu)}
#no-results .emoji{font-size:40px;display:block;margin-bottom:12px}

/* DRUG DETAIL VIEW */
#v-detail{padding:0}
.detail-header{background:linear-gradient(135deg,#0a2540,#1a3a5c);
  padding:16px;flex-shrink:0;border-bottom:1px solid var(--bd)}
.detail-header .back{background:none;border:none;color:var(--ac);
  font-size:15px;cursor:pointer;padding:0;margin-bottom:8px;
  display:flex;align-items:center;gap:4px}
.detail-header h2{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-header .brands{font-size:12px;color:var(--mu)}
.detail-body{padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.section-card{background:var(--s1);border:1px solid var(--bd);
  border-radius:12px;padding:14px;margin-bottom:12px}
.section-card h4{font-size:11px;font-weight:700;color:var(--ac);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--bd)}
.dose-row{display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:10px}
.dose-row:last-child{border-bottom:none;padding-bottom:0}
.dose-label{font-size:12px;color:var(--mu);flex:1;line-height:1.4}
.dose-value{font-size:13px;font-weight:600;color:var(--tx);text-align:right;
  max-width:55%;line-height:1.4}
.obs-text{font-size:13px;line-height:1.7;color:#cde;white-space:pre-wrap;
  word-break:break-word}
.raw-text{font-size:12px;line-height:1.7;color:var(--mu);white-space:pre-wrap;
  font-family:monospace;background:rgba(0,0,0,.2);padding:10px;border-radius:8px;
  word-break:break-all}
.pg-ref{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.2);
  border-radius:10px;margin-bottom:12px;cursor:pointer;font-size:13px;color:var(--ac)}

/* INDEX */
#v-index{padding:10px}
.alpha-section{margin-bottom:4px}
.alpha-letter{font-size:13px;font-weight:700;color:var(--ac);
  padding:8px 6px 4px;position:sticky;top:0;background:var(--bg);z-index:5}
.idx-item{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.idx-item:active{background:var(--s1)}
.idx-name{font-size:15px}
.idx-pg{font-size:12px;color:var(--mu)}

/* NAV BAR */
#nav{background:var(--s1);border-top:1px solid var(--bd);
  padding:6px 0 calc(var(--sb)+6px);display:flex;flex-shrink:0}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:6px 0;cursor:pointer;-webkit-user-select:none}
.nav-tab .icon{font-size:20px}
.nav-tab .label{font-size:10px;color:var(--mu)}
.nav-tab.active .icon{color:var(--ac)}
.nav-tab.active .label{color:var(--ac)}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hd">
    <div class="hd-row">
      <div class="logo">FP</div>
      <div class="hd-title">
        <h1>Formulário de Pediatria</h1>
        <p>3ª Edição · Rui Anjos et al.</p>
      </div>
    </div>
    <div class="search-wrap">
      <span class="si-icon">🔍</span>
      <input type="search" id="si" placeholder="Pesquisar fármaco..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="si-clear" id="si-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- HOME -->
    <div id="v-home" class="view active">
      <div class="section-title">⚠️ Emergência / UCI</div>
      <div class="drug-grid" id="grid-urgent"></div>
      <div class="section-title">Antibióticos</div>
      <div class="drug-grid" id="grid-abx"></div>
      <div class="section-title">🍼 Neonatologia / Especiais</div>
      <div class="drug-grid" id="grid-neo"></div>
      <div class="section-title">Todos os Fármacos</div>
      <div class="drug-grid" id="grid-all"></div>
    </div>

    <!-- SEARCH RESULTS -->
    <div id="v-search" class="view">
      <div class="sr-count" id="sr-count"></div>
      <div id="sr-list"></div>
    </div>

    <!-- DRUG DETAIL -->
    <div id="v-detail" class="view">
      <div class="detail-header">
        <button class="back" onclick="goBack()">← Voltar</button>
        <h2 id="d-name"></h2>
        <div class="brands" id="d-brands"></div>
      </div>
      <div class="detail-body" id="d-body"></div>
    </div>

    <!-- INDEX -->
    <div id="v-index" class="view">
      <div id="idx-list"></div>
    </div>

  </div>

  <!-- NAV BAR -->
  <div id="nav">
    <div class="nav-tab active" onclick="showView('home')" id="tab-home">
      <span class="icon">🏠</span><span class="label">Início</span>
    </div>
    <div class="nav-tab" onclick="showView('index')" id="tab-index">
      <span class="icon">📋</span><span class="label">Índice</span>
    </div>
  </div>

</div>

<script src="drugs.js"></script>
<script>
var currentView = 'home';
var prevView = 'home';

// ── CATEGORIES ──
var URGENT = ['Adrenalina (Epinefrina)','Atropina','Midazolam','Morfina',
  'Ketamina','Dopamina','Dobutamina','Noradrenalina','Milrinona',
  'Adenosina','Bicarbonato de Sódio','Gluconato de Cálcio','Glucose',
  'Naloxona','Nitroprussiato de Sódio','Fenitoína','Fenobarbital','Fosfenitoína',
  'Levetiracetam','Lorazepam','Dexmedetomidina','Rocurônio','Sugammadex',
  'Nicardipina','Diazepam','Clonazepam','Fentanil','Propofol','Vecurônio',
  'Lidocaína','Labetalol','Heparina','Insulina','Hidrocortisona',
  'Tranexâmico (Ácido)','Óxido Nítrico Inalado','Surfactante Exógeno',
  'Dexametasona','Vancomicina','Imipenem','Meropenem'];

var NEO = ['Citrato de Cafeína','Surfactante Exógeno','Óxido Nítrico Inalado',
  'Sildenafil','Dexmedetomidina','Rocurônio','Sugammadex',
  'Tranexâmico (Ácido)','Fosfenitoína','Nicardipina','Propofol','Levetiracetam'];

var ABX = ['Amicacina','Amoxicilina','Ampicilina','Azitromicina',
  'Cefazolina','Cefalexina','Cefotaxima','Ceftriaxona','Cefuroxima',
  'Ciprofloxacina','Claritromicina','Clindamicina','Cloxacilina',
  'Colistina','Cotrimoxazol (SMZ/TMP)','Eritromicina','Gentamicina',
  'Isoniazida','Levofloxacina','Metronidazol','Oxacilina',
  'Penicilina G','Penicilina V','Piperacilina/Tazobactam',
  'Rifampicina','Tobramicina','Vancomicina','Imipenem','Meropenem',
  'Anfotericina B','Fluconazol'];

function drugClass(name) {
  if (URGENT.indexOf(name) >= 0) return 'urgent';
  if (ABX.indexOf(name) >= 0) return 'important';
  return 'normal';
}
function drugTag(name) {
  if (URGENT.indexOf(name) >= 0) return '<span class="tag tag-red">UCI/Emergência</span>';
  if (ABX.indexOf(name) >= 0) return '<span class="tag tag-ylw">Antibiótico</span>';
  return '';
}

// ── BUILD HOME GRIDS ──
function buildHome() {
  var urgentDrugs = DRUGS.filter(function(d){ return URGENT.indexOf(d.n) >= 0; });
  var abxDrugs = DRUGS.filter(function(d){ return ABX.indexOf(d.n) >= 0 && URGENT.indexOf(d.n) < 0; });
  var allDrugs = DRUGS.slice().sort(function(a,b){ return a.n.localeCompare(b.n,'pt'); });

  var neoDrugs = DRUGS.filter(function(d){ return NEO.indexOf(d.n) >= 0; });
  renderGrid('grid-urgent', urgentDrugs, 'urgent');
  renderGrid('grid-abx', abxDrugs, 'important');
  renderGrid('grid-neo', neoDrugs, 'normal');
  renderGrid('grid-all', allDrugs, 'normal');
}

function renderGrid(id, drugs, cls) {
  var g = document.getElementById(id);
  var html = '';
  for (var i = 0; i < drugs.length; i++) {
    var d = drugs[i];
    var c = cls || drugClass(d.n);
    var extraBadge = d.src === 'extra' ? ' <span style="font-size:9px;color:#ffcc80">★</span>' : '';
    html += '<div class="drug-card ' + c + '" onclick="showDrug(' + DRUGS.indexOf(d) + ')">';
    html += '<h3>' + d.n + extraBadge + '</h3>';
    html += drugTag(d.n);
    html += '<div class="pg">pág. ' + d.p + '</div>';
    html += '</div>';
  }
  g.innerHTML = html;
}

// ── BUILD INDEX ──
function buildIndex() {
  var sorted = DRUGS.slice().sort(function(a,b){ return a.n.localeCompare(b.n,'pt'); });
  var letters = {};
  for (var i = 0; i < sorted.length; i++) {
    var l = sorted[i].n[0].toUpperCase();
    if (!letters[l]) letters[l] = [];
    letters[l].push(sorted[i]);
  }
  var html = '';
  var keys = Object.keys(letters).sort();
  for (var k = 0; k < keys.length; k++) {
    var letter = keys[k];
    html += '<div class="alpha-section">';
    html += '<div class="alpha-letter">' + letter + '</div>';
    for (var j = 0; j < letters[letter].length; j++) {
      var d = letters[letter][j];
      var idx = DRUGS.indexOf(d);
      html += '<div class="idx-item" onclick="showDrug(' + idx + ')">';
      html += '<span class="idx-name">' + d.n + '</span>';
      html += '<span class="idx-pg">pág. ' + d.p + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('idx-list').innerHTML = html;
}

// ── SHOW DRUG ──
function showDrug(idx) {
  var d = DRUGS[idx];
  prevView = currentView;
  document.getElementById('d-name').textContent = d.n;

  // Extract brand names from text (lines after drug name before dosing)
  var lines = d.t.split('\n');
  var brands = [];
  for (var i = 1; i < Math.min(6, lines.length); i++) {
    var l = lines[i].trim();
    if (l && !l.match(/^(ev|oral|im|sc|retal|nasal|DOSE|mg|mcg|0,|1-|2-|per)/i) && l.length < 50) {
      brands.push(l);
    }
  }
  document.getElementById('d-brands').textContent = brands.slice(0,3).join(' · ');
  // Source badge
  var srcBadge = d.src === 'extra' 
    ? '<div style="margin-top:6px;display:inline-block;background:rgba(255,167,38,.15);border:1px solid rgba(255,167,38,.3);color:#ffcc80;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.5px">⚠️ NÃO CONSTA NO FORMULÁRIO ORIGINAL · Adicionado com fonte bibliográfica</div>'
    : '<div style="margin-top:6px;display:inline-block;background:rgba(102,187,106,.1);border:1px solid rgba(102,187,106,.25);color:#a5d6a7;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.5px">✓ Formulário de Pediatria 3ª Ed.</div>';
  document.getElementById('d-brands').innerHTML += srcBadge;

  // Build detail body
  var body = '';

  // Page reference
  body += '<div class="pg-ref" onclick="window.open(\'https://possn.github.io/Formulario-Pediatria/index.html#p' + d.p + '\',\'_blank\')">';
  body += '📄 Ver página original — pág. ' + d.p + ' →</div>';

  // Raw text card (the meat of the entry)
  body += '<div class="section-card">';
  body += '<h4>Posologia &amp; Informação</h4>';
  body += '<div class="raw-text">' + escHtml(d.t.trim()) + '</div>';
  body += '</div>';

  document.getElementById('d-body').innerHTML = body;
  document.getElementById('d-body').scrollTo(0,0);
  showView('detail');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SEARCH ──
var si = document.getElementById('si');
var db;
si.addEventListener('input', function() {
  clearTimeout(db);
  var q = si.value.trim();
  document.getElementById('si-clear').style.display = q ? 'block' : 'none';
  if (!q) { showView('home'); return; }
  db = setTimeout(function(){ doSearch(q); }, 200);
});

function clearSearch() {
  si.value = '';
  document.getElementById('si-clear').style.display = 'none';
  showView('home');
  si.focus();
}

function doSearch(query) {
  showView('search');
  var q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  var matches = [];
  for (var i = 0; i < DRUGS.length; i++) {
    var d = DRUGS[i];
    var nameNorm = d.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    var textNorm = d.t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    var nameMatch = nameNorm.includes(q);
    var textMatch = textNorm.includes(q);
    if (nameMatch || textMatch) {
      var score = nameMatch ? 10 : 1;
      matches.push({d:d, idx:i, score:score});
    }
  }
  matches.sort(function(a,b){ return b.score - a.score; });

  document.getElementById('sr-count').textContent =
    matches.length ? matches.length + ' resultado(s) para "' + query + '"' : '';

  if (!matches.length) {
    document.getElementById('sr-list').innerHTML =
      '<div id="no-results"><span class="emoji">🔎</span>Sem resultados para <strong>"'+query+'"</strong></div>';
    return;
  }

  var html = '';
  var re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  for (var j = 0; j < Math.min(matches.length, 40); j++) {
    var m = matches[j];
    var excerpt = m.d.t.slice(0, 200).replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim();
    var nameHl = m.d.n.replace(re, function(x){ return '<span class="hl">'+x+'</span>'; });
    var exHl = escHtml(excerpt).replace(re, function(x){ return '<span class="hl">'+x+'</span>'; });
    html += '<div class="sr-item" onclick="showDrug('+m.idx+')">';
    html += '<div class="sr-name">' + nameHl + '</div>';
    html += '<div class="sr-excerpt">' + exHl + '</div>';
    html += '</div>';
  }
  document.getElementById('sr-list').innerHTML = html;
}

// ── NAVIGATION ──
function showView(v) {
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(function(el){ el.classList.remove('active'); });
  var tab = document.getElementById('tab-'+v);
  if (tab) tab.classList.add('active');
  currentView = v;
}

function goBack() {
  showView(prevView === 'detail' ? 'home' : prevView);
}

// ── INIT ──
buildHome();
buildIndex();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
